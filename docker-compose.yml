services:
  db:
    image: postgres:15
    container_name: health-db
    restart: always
    environment:
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: AgeAidRaspberry1810
      POSTGRES_DB: healthdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: health-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8502:8502"
      - "8501:8501"

volumes:
  postgres_data: